<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AutoVision — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #090c12;
  --bg1:     #0d1117;
  --panel:   #0f1520;
  --border:  rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text:    #e8eaf0;
  --muted:   #6b7280;
  --accent:  #00d4aa;
  --accent2: #0ea5e9;
  --red:     #ef4444;
  --font-head: 'Syne', sans-serif;
  --font-body: 'DM Sans', sans-serif;
  --font-mono: 'DM Mono', monospace;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 14px;
  line-height: 1.5;
  overflow-x: hidden;
}

/* Animated background grid */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background-image:
    linear-gradient(rgba(0,212,170,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,212,170,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
}
body::after {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(0,212,170,0.08) 0%, transparent 60%);
  pointer-events: none;
}

.login-wrapper {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

.login-card {
  width: 100%;
  max-width: 480px;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
  animation: fadeUp 0.6s ease both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: none; }
}

/* Card header */
.login-header {
  padding: 28px 32px 20px;
  border-bottom: 1px solid var(--border);
  text-align: center;
}

.logo-mark {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 48px;
  height: 48px;
  border: 2px solid var(--accent);
  border-radius: 12px;
  font-family: var(--font-head);
  font-size: 18px;
  font-weight: 800;
  color: var(--accent);
  margin-bottom: 14px;
  position: relative;
}
.logo-mark::after {
  content: '';
  position: absolute;
  inset: -4px;
  border-radius: 14px;
  border: 1px solid rgba(0,212,170,0.15);
  animation: pulse-ring 3s ease infinite;
}
@keyframes pulse-ring {
  0%,100% { opacity: 0.5; transform: scale(1); }
  50%     { opacity: 0; transform: scale(1.15); }
}

.login-title {
  font-family: var(--font-head);
  font-size: 22px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 4px;
}
.login-title span { color: var(--accent); }

.login-subtitle {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.06em;
}

/* Form body */
.login-body {
  padding: 24px 32px 28px;
}

.section-label {
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 500;
  color: var(--muted);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 12px;
}
.form-row.full {
  grid-template-columns: 1fr;
}

.form-group {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.form-group label {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.form-group input, .form-group select {
  width: 100%;
  padding: 10px 14px;
  border: 1px solid var(--border2);
  border-radius: 8px;
  background: rgba(255,255,255,0.03);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 13px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.form-group select option {
  background: #0f1520;
  color: var(--text);
}
.form-group input::placeholder {
  color: rgba(255,255,255,0.2);
}
.form-group input:focus, .form-group select:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(0,212,170,0.1);
}
.form-group input.error, .form-group select.error {
  border-color: var(--red);
  box-shadow: 0 0 0 3px rgba(239,68,68,0.1);
}

.error-msg {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--red);
  min-height: 14px;
  margin-top: 2px;
}

.hint-text {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--muted);
  margin-top: 2px;
}

/* Submit button */
.login-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: 100%;
  padding: 13px;
  margin-top: 20px;
  border: none;
  border-radius: 10px;
  background: var(--accent);
  color: #000;
  font-family: var(--font-head);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.04em;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.15s;
}
.login-btn:hover {
  opacity: 0.88;
  transform: translateY(-1px);
}
.login-btn:active {
  transform: translateY(0);
}

.login-btn svg {
  width: 16px;
  height: 16px;
}

/* Footer note */
.login-footer {
  padding: 14px 32px;
  border-top: 1px solid var(--border);
  text-align: center;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--muted);
}
.login-footer a {
  color: var(--accent);
  text-decoration: none;
}

/* Toast */
.toast {
  display: none;
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(239,68,68,0.15);
  border: 1px solid rgba(239,68,68,0.3);
  color: #fca5a5;
  padding: 10px 20px;
  border-radius: 8px;
  font-family: var(--font-mono);
  font-size: 12px;
  z-index: 999;
  animation: toast-in 0.3s ease;
}
.toast.show { display: block; }
@keyframes toast-in {
  from { opacity: 0; transform: translateX(-50%) translateY(8px); }
  to   { opacity: 1; transform: translateX(-50%) translateY(0); }
}

@media (max-width: 520px) {
  .login-card { max-width: 100%; }
  .form-row { grid-template-columns: 1fr; }
  .login-header, .login-body { padding-left: 20px; padding-right: 20px; }
}
</style>
</head>
<body>

<div class="login-wrapper">
  <div class="login-card">

    <!-- Header -->
    <div class="login-header">
      <div class="logo-mark">[v]</div>
      <div class="login-title">Auto<span>Vision</span></div>
      <div class="login-subtitle">AI Damage Inspection System</div>
    </div>

    <!-- Form -->
    <form class="login-body" id="login-form" autocomplete="on" novalidate>

      <div class="section-label">Inspector Details</div>

      <div class="form-row">
        <div class="form-group">
          <label for="fullname">Full Name *</label>
          <input type="text" id="fullname" placeholder="John Doe" required autocomplete="name"/>
          <div class="error-msg" id="err-fullname"></div>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="john@example.com" autocomplete="email"/>
          <div class="error-msg" id="err-email"></div>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" placeholder="+91 98765 43210" autocomplete="tel"/>
          <div class="error-msg" id="err-phone"></div>
        </div>
        <div class="form-group">
          <label for="company">Company / Organisation</label>
          <input type="text" id="company" placeholder="ABC Insurance Ltd." autocomplete="organization"/>
        </div>
      </div>

      <div class="section-label" style="margin-top: 20px;">Vehicle Details</div>

      <div class="form-row">
        <div class="form-group">
          <label for="vehicle-reg">Vehicle Reg. Number *</label>
          <input type="text" id="vehicle-reg" placeholder="MH 01 AB 1234" required style="text-transform:uppercase"/>
          <div class="error-msg" id="err-vehicle-reg"></div>
        </div>
        <div class="form-group">
          <label for="vehicle-model">Car Model *</label>
          <select id="vehicle-model" required>
            <option value="Maruti Alto">Maruti Alto</option>
            <option value="Maruti Swift" selected>Maruti Swift</option>
            <option value="Maruti Baleno">Maruti Baleno</option>
            <option value="Maruti Wagon R">Maruti Wagon R</option>
            <option value="Hyundai i10">Hyundai i10</option>
            <option value="Hyundai i20">Hyundai i20</option>
            <option value="Hyundai Creta">Hyundai Creta</option>
            <option value="Hyundai Verna">Hyundai Verna</option>
            <option value="Honda City">Honda City</option>
            <option value="Honda Amaze">Honda Amaze</option>
            <option value="Tata Nexon">Tata Nexon</option>
            <option value="Tata Harrier">Tata Harrier</option>
            <option value="Tata Tiago">Tata Tiago</option>
            <option value="Kia Seltos">Kia Seltos</option>
            <option value="Kia Sonet">Kia Sonet</option>
            <option value="Mahindra XUV700">Mahindra XUV700</option>
            <option value="Mahindra Scorpio">Mahindra Scorpio</option>
            <option value="Toyota Fortuner">Toyota Fortuner</option>
            <option value="Toyota Innova">Toyota Innova</option>
            <option value="BMW 3 Series">BMW 3 Series</option>
            <option value="Audi A4">Audi A4</option>
            <option value="Mercedes C-Class">Mercedes C-Class</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="purchase-year">Purchase Year *</label>
          <input type="number" id="purchase-year" min="2010" max="2026" value="2022" required/>
          <div class="hint-text" id="age-hint">Age: 4 years</div>
          <div class="error-msg" id="err-purchase-year"></div>
        </div>
        <div class="form-group">
          <label for="km-driven">KM Driven *</label>
          <input type="number" id="km-driven" min="0" max="300000" step="1000" value="40000" required/>
          <div class="hint-text" id="km-hint">Normal range</div>
        </div>
      </div>

      <div class="form-row full">
        <div class="form-group">
          <label for="owner-name">Vehicle Owner Name</label>
          <input type="text" id="owner-name" placeholder="Owner's full name"/>
        </div>
      </div>

      <button type="submit" class="login-btn">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="7" cy="7" r="4.5"/>
          <path d="M10.5 10.5L14 14"/>
        </svg>
        Start Inspection
      </button>
    </form>

    <div class="login-footer">
      Powered by <a href="#">AutoVision AI</a> &middot; Deep Learning Vehicle Inspection
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const form = document.getElementById('login-form');
const currentYear = new Date().getFullYear();

// Live hints for Purchase Year and KM Driven
const purchaseYearInput = document.getElementById('purchase-year');
const kmDrivenInput     = document.getElementById('km-driven');
const ageHint           = document.getElementById('age-hint');
const kmHint            = document.getElementById('km-hint');

purchaseYearInput.max = currentYear;
purchaseYearInput.addEventListener('input', () => {
  const age = currentYear - parseInt(purchaseYearInput.value || currentYear);
  ageHint.textContent = 'Age: ' + Math.max(0, age) + ' year' + (age !== 1 ? 's' : '');
});
kmDrivenInput.addEventListener('input', () => {
  const km = parseInt(kmDrivenInput.value || 0);
  kmHint.textContent = km >= 80000 ? '⚠ High mileage' : 'Normal range';
});

form.addEventListener('submit', (e) => {
  e.preventDefault();
  clearErrors();

  const fullname     = document.getElementById('fullname').value.trim();
  const email        = document.getElementById('email').value.trim();
  const phone        = document.getElementById('phone').value.trim();
  const company      = document.getElementById('company').value.trim();
  const vehicleReg   = document.getElementById('vehicle-reg').value.trim().toUpperCase();
  const vehicleModel = document.getElementById('vehicle-model').value;
  const purchaseYear = parseInt(document.getElementById('purchase-year').value);
  const kmDriven     = parseInt(document.getElementById('km-driven').value) || 0;
  const ownerName    = document.getElementById('owner-name').value.trim();

  let valid = true;

  // Validate required fields
  if (!fullname) {
    showFieldError('fullname', 'Name is required');
    valid = false;
  }
  if (!vehicleReg) {
    showFieldError('vehicle-reg', 'Registration number is required');
    valid = false;
  }
  if (!purchaseYear || purchaseYear < 2010 || purchaseYear > currentYear) {
    showFieldError('purchase-year', 'Enter a valid year (2010–' + currentYear + ')');
    valid = false;
  }

  // Validate email format (if provided)
  if (email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    showFieldError('email', 'Invalid email format');
    valid = false;
  }

  if (!valid) return;

  // Store user data in sessionStorage
  const userData = {
    fullname,
    email,
    phone,
    company,
    vehicleReg,
    vehicleModel,
    purchaseYear,
    kmDriven,
    ownerName,
    loginTime: new Date().toISOString(),
  };
  sessionStorage.setItem('autovision_user', JSON.stringify(userData));

  // Redirect to inspection dashboard
  window.location.href = 'index.html';
});

function showFieldError(fieldId, msg) {
  const input = document.getElementById(fieldId);
  const err   = document.getElementById('err-' + fieldId);
  if (input) input.classList.add('error');
  if (err)   err.textContent = msg;
}

function clearErrors() {
  document.querySelectorAll('.error-msg').forEach(el => el.textContent = '');
  document.querySelectorAll('input.error, select.error').forEach(el => el.classList.remove('error'));
}
</script>
</body>
</html>
